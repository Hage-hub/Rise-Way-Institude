kind = "web"
previewPath = "/"
title = "RISE-WAY Institute Website"
version = "1.0.0"
id = "artifacts/riseway-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20795

[services.development]
run = "pnpm --filter @workspace/riseway-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/riseway-website", "run", "build" ]
publicDir = "artifacts/riseway-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20795"
BASE_PATH = "/"
